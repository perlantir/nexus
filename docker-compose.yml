services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: decigraph-db
    environment:
      POSTGRES_USER: decigraph
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-decigraph_dev}
      POSTGRES_DB: decigraph
    ports:
      - "5432:5432"
    volumes:
      - decigraph_pgdata:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decigraph"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decigraph-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://decigraph:${POSTGRES_PASSWORD:-decigraph_dev}@postgres:5432/decigraph}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      PORT: 3100
      HOST: 0.0.0.0
      NODE_ENV: ${NODE_ENV:-development}
      DECIGRAPH_API_KEY: ${DECIGRAPH_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DECIGRAPH_EMBEDDINGS_URL: ${DECIGRAPH_EMBEDDINGS_URL:-}
      DECIGRAPH_EMBEDDINGS_KEY: ${DECIGRAPH_EMBEDDINGS_KEY:-}
      DECIGRAPH_EMBEDDINGS_MODEL: ${DECIGRAPH_EMBEDDINGS_MODEL:-}
      DECIGRAPH_LLM_URL: ${DECIGRAPH_LLM_URL:-}
      DECIGRAPH_LLM_KEY: ${DECIGRAPH_LLM_KEY:-}
      DECIGRAPH_LLM_MODEL: ${DECIGRAPH_LLM_MODEL:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      DISTILLERY_PROVIDER: ${DISTILLERY_PROVIDER:-}
      DECIGRAPH_CORS_ORIGINS: ${DECIGRAPH_CORS_ORIGINS:-}
    ports:
      - "3100:3100"
    volumes:
      - ./supabase/migrations:/app/supabase/migrations:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3100}
        CACHE_BUSTER: ${CACHE_BUSTER:-1}
    container_name: decigraph-dashboard
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3200:80"
    restart: unless-stopped

volumes:
  decigraph_pgdata:
